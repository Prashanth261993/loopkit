    <text x="1072.5" y="665" fill="#1e1e1e" font-family="Virgil, Segoe Print, Comic Sans MS, Segoe UI, sans-serif" font-size="14" font-weight="400" font-style="normal" text-anchor="middle" dominant-baseline="middle"><tspan x="1072.5" dy="-17.5">one versioned JSON event schema. Evals</tspan><tspan x="1072.5" dy="17.5">and the dashboard consume the same</tspan><tspan x="1072.5" dy="17.5">stream.</tspan></text>
  </g><g id="arrow_1052">
