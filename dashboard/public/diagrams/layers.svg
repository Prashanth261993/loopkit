    <text x="550" y="209" fill="#1e1e1e" font-family="Virgil, Segoe Print, Comic Sans MS, Segoe UI, sans-serif" font-size="14" font-weight="400" font-style="normal" text-anchor="middle" dominant-baseline="middle"><tspan x="550" dy="-8.75">React/TS — one consumer of the event stream, works for every</tspan><tspan x="550" dy="17.5">agent</tspan></text>
