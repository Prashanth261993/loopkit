  </g><text x="650" y="805" fill="#1e1e1e" font-family="Virgil, Segoe Print, Comic Sans MS, Segoe UI, sans-serif" font-size="18" font-weight="400" font-style="italic" text-anchor="middle" dominant-baseline="middle"><tspan x="650" dy="0">Inside-out: build the runtime, then prove it with agents that are just tools + policies.</tspan></text>
