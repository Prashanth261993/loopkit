[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "loopkit"
version = "0.1.0"
description = "Agent loop engineering toolkit: a framework-agnostic loop kernel with built-in observability, self-healing, and evals."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "LoopKit" }]
keywords = ["agent", "llm", "loop", "react", "reflexion", "observability", "evals"]
dependencies = [
    "pydantic>=2.5",
]

[project.optional-dependencies]
openai = ["openai>=1.0"]
anthropic = ["anthropic>=0.30"]
dev = ["pytest>=8", "ruff>=0.5"]

[tool.hatch.build.targets.wheel]
packages = ["src/loopkit"]

[tool.ruff]
line-length = 100
target-version = "py311"
